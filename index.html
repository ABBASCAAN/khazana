<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Khazana | One Screen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;600&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Plus Jakarta Sans', 'IBM Plex Sans Arabic', sans-serif;
            background: #ffffff;
        }
        .app-shell {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom) 24px;
            background: radial-gradient(circle at 0% 0%, #f0fdf4 0%, #ffffff 100%);
        }
        .urdu-main { font-family: 'IBM Plex Sans Arabic', sans-serif; line-height: 1.4; }
        .glass-btn {
            transition: all 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .glass-btn:active { transform: scale(0.96); opacity: 0.9; }
        
        .visual-blob {
            position: absolute; width: 300px; height: 300px;
            background: rgba(16, 185, 129, 0.05);
            filter: blur(80px); border-radius: 50%; z-index: -1;
        }
    </style>
</head>
<body>

    <div class="visual-blob" style="top: -100px; right: -100px;"></div>
    <div class="visual-blob" style="bottom: -100px; left: -100px;"></div>

    <div class="app-shell">
        
        <header class="pt-8 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-black rounded-xl shadow-lg"></div>
                <span class="text-xl font-[800] tracking-tighter uppercase">Khazana.</span>
            </div>
            <span class="bg-emerald-50 text-emerald-600 text-[10px] font-black px-3 py-1 rounded-full border border-emerald-100 uppercase tracking-widest">Permanent Free</span>
        </header>

        <div class="flex-grow flex flex-col justify-center items-center text-center space-y-6">
            <div class="relative">
                <div class="absolute -inset-4 bg-emerald-500/10 blur-xl rounded-full"></div>
                <img src="https://img.icons8.com/fluency/180/diamond.png" class="w-24 h-24 relative" alt="Premium Visual"/>
            </div>
            
            <div class="space-y-3">
                <h1 class="urdu-main text-4xl font-semibold text-slate-900">آپ کا ہنر، آپ کا مستقبل</h1>
                <p class="urdu-main text-lg text-slate-400 font-light max-w-[280px] mx-auto">
                    پاکستان کا سب سے بڑا اور شفاف پلیٹ فارم جہاں نوکری تلاش کرنا اب نہایت آسان ہے۔
                </p>
            </div>
        </div>

        <footer class="pb-12 space-y-4">
            <button class="glass-btn w-full bg-black text-white rounded-[24px] py-6 flex flex-row-reverse items-center justify-center gap-4 shadow-2xl shadow-black/20">
                <span class="urdu-main text-xl font-semibold">نوکری تلاش کریں</span>
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </button>
            
            <button class="glass-btn w-full bg-white border border-slate-100 text-slate-900 rounded-[24px] py-6 flex flex-row-reverse items-center justify-center gap-4 shadow-sm">
                <span class="urdu-main text-xl font-semibold">اشتہار لگائیں</span>
                <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
            </button>

            <div class="pt-4 text-center">
                <p class="urdu-main text-[11px] text-slate-300 font-semibold tracking-widest uppercase">National Infrastructure Network</p>
            </div>
        </footer>

    </div>

</body>
</html>
