<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Khazana Jobs | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;800&family=IBM+Plex+Sans+Arabic:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --deep-blue: #000B18; --accent-blue: #007AFF; }
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--deep-blue);
            color: white;
        }
        .main-canvas {
            height: 100vh; display: flex; flex-direction: column; justify-content: space-between;
            padding: env(safe-area-inset-top) 30px env(safe-area-inset-bottom) 30px;
            background: radial-gradient(circle at 50% 0%, #001E3C 0%, #000B18 100%);
        }
        /* Minimal English Buttons */
        .btn-minimal {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            transition: 0.4s cubic-bezier(0.1, 1, 0.1, 1);
        }
        .btn-minimal:active { background: rgba(0, 122, 255, 0.2); border-color: var(--accent-blue); transform: scale(0.95); }

        /* The Hypnotic Pop-up (Modal) */
        #welcomeModal {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 1; transition: 0.5s ease;
        }
        .modal-content {
            width: 85%; max-width: 350px; background: linear-gradient(145deg, #001E3C, #000B18);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 40px 30px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .urdu-pop { font-family: 'IBM Plex Sans Arabic', sans-serif; }
    </style>
</head>
<body>

    <div id="welcomeModal">
        <div class="modal-content space-y-8">
            <div class="space-y-2">
                <div class="w-12 h-12 bg-blue-500/20 rounded-full mx-auto flex items-center justify-center text-xl">💙</div>
                <h3 class="urdu-pop text-2xl font-bold text-white tracking-tight">پختون بھائیوں کا تحفہ</h3>
            </div>
            
            <p class="urdu-pop text-sm text-white/60 leading-relaxed">
                یہ ایپ پختون مٹی کے نوجوانوں نے خاص اپنے بھائیوں کے لیے بنائی ہے تاکہ کوئی ہاتھ خالی نہ رہے۔ یہ پلیٹ فارم پاکستان کے لیے ہمیشہ مفت رہے گا۔
            </p>

            <div class="space-y-4 pt-4">
                <p class="urdu-pop text-xs text-blue-400 font-bold uppercase tracking-widest italic">اس خیر کو پھیلانے میں ہمارا ساتھ دیں</p>
                <button onclick="window.open('whatsapp://send?text=Brother, check this out! A platform by Pashtun youth for everyone. Totally Free.')" 
                    class="w-full py-5 bg-blue-600 rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] shadow-lg shadow-blue-600/20 active:scale-95 transition-all">
                    Share on WhatsApp
                </button>
                <button onclick="document.getElementById('welcomeModal').style.opacity='0'; setTimeout(()=>document.getElementById('welcomeModal').style.display='none', 500)" 
                    class="w-full py-4 text-[9px] font-bold text-white/30 uppercase tracking-widest">
                    Skip to App
                </button>
            </div>
        </div>
    </div>

    <div class="main-canvas">
        
        <header class="pt-10 flex flex-col items-center">
            <h1 class="text-2xl font-black italic tracking-tighter text-white">KHAZANA <span class="text-blue-500">JOBS</span></h1>
            <p class="text-[8px] font-bold text-white/20 tracking-[0.6em] uppercase mt-2">Elite Global Infrastructure</p>
        </header>

        <div class="flex flex-col items-center text-center px-4">
            <div class="w-24 h-[1px] bg-gradient-to-r from-transparent via-blue-500/50 to-transparent mb-8"></div>
            <h2 class="text-4xl font-extrabold tracking-tighter text-white opacity-90">EMPOWERING <br> THE NATION.</h2>
            <div class="w-24 h-[1px] bg-gradient-to-r from-transparent via-blue-500/50 to-transparent mt-8"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 pb-12">
            <button class="btn-minimal">Find Job</button>
            <button class="btn-minimal text-blue-400 border-blue-500/20">Post Job</button>
            <button class="btn-minimal opacity-40 !h-16">About Us</button>
            <button class="btn-minimal opacity-40 !h-16">Contact</button>
        </div>

    </div>

</body>
</html>
