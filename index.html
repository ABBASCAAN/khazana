<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Khazana Jobs | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;800&display=swap" rel="stylesheet">
    
    <style>
        /* Loading Jameel Noori Nastaleeq from a reliable web source */
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://font.paksign.com/fonts/Jameel-Noori-Nastaleeq.ttf') format('truetype');
        }

        :root { --deep-blue: #000B18; --accent-blue: #00D2FF; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--deep-blue);
            color: white;
        }

        .urdu-nastaleeq { 
            font-family: 'Jameel Noori Nastaleeq', 'serif'; 
            line-height: 1.8;
            direction: rtl;
        }

        .main-canvas {
            height: 100vh; display: flex; flex-direction: column; justify-content: space-between;
            padding: env(safe-area-inset-top) 30px env(safe-area-inset-bottom) 30px;
            background: radial-gradient(circle at 50% 0%, #001E3C 0%, #000B18 100%);
        }

        /* Pro Minimal Buttons */
        .btn-minimal {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.35em;
            transition: all 0.5s ease;
        }
        .btn-minimal:active { transform: scale(0.94); background: rgba(0, 210, 255, 0.1); border-color: var(--accent-blue); }

        /* The Imperial Pop-up */
        #welcomeModal {
            position: fixed; inset: 0; background: rgba(0, 8, 20, 0.92);
            backdrop-filter: blur(20px); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .modal-content {
            width: 90%; max-width: 380px; 
            background: linear-gradient(160deg, #002347 0%, #000B18 100%);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 45px; padding: 45px 30px; text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .share-btn {
            background: linear-gradient(135deg, #25D366 0%, #075E54 100%);
            box-shadow: 0 15px 35px rgba(37, 211, 102, 0.25);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .aura-glow {
            position: absolute; top: -20%; left: 50%; transform: translateX(-50%);
            width: 200px; height: 200px; background: var(--accent-blue);
            filter: blur(100px); opacity: 0.15; z-index: -1;
        }
    </style>
</head>
<body>

    <div id="welcomeModal">
        <div class="modal-content space-y-6">
            <div class="aura-glow"></div>
            
            <div class="space-y-2">
                <span class="text-3xl">✨</span>
                <h3 class="urdu-nastaleeq text-4xl text-white pt-2">پختون بھائیوں کا مخلصانہ تحفہ</h3>
            </div>
            
            <p class="urdu-nastaleeq text-xl text-white/80 leading-relaxed px-2">
                یہ پلیٹ فارم پختون مٹی کے نوجوانوں نے خاص اپنے بھائیوں کے لیے بنایا ہے تاکہ کوئی بھی باصلاحیت ہاتھ خالی نہ رہے۔ یہ خدمت صرف پاکستان کے لیے ہے اور ہمیشہ بالکل مفت رہے گی۔
            </p>

            <div class="space-y-4 pt-6">
                <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-cyan-500/30 to-transparent"></div>
                <p class="urdu-nastaleeq text-lg text-cyan-400">اس خیر کو پھیلانے میں ہمارا ساتھ دیں</p>
                
                <button onclick="window.open('whatsapp://send?text=Pakhtun bhaiyo, ye app khas hamare liye hai. Ise share karo taake koi be-rozgar na rahe!')" 
                    class="share-btn w-full py-5 rounded-3xl font-black text-[10px] text-white uppercase tracking-[0.3em] active:scale-95 transition-all">
                    Share on WhatsApp
                </button>
                
                <button onclick="document.getElementById('welcomeModal').style.opacity='0'; setTimeout(()=>document.getElementById('welcomeModal').style.display='none', 600)" 
                    class="w-full py-2 text-[9px] font-bold text-white/20 uppercase tracking-widest hover:text-white/50 transition-all">
                    Enter Khazana
                </button>
            </div>
        </div>
    </div>

    <div class="main-canvas">
        
        <header class="pt-12 flex flex-col items-center">
            <h1 class="text-2xl font-[900] italic tracking-tighter text-white">KHAZANA <span class="text-cyan-500">JOBS</span></h1>
            <div class="flex items-center gap-2 mt-2">
                <div class="w-1 h-1 bg-cyan-500 rounded-full animate-pulse"></div>
                <p class="text-[8px] font-bold text-white/30 tracking-[0.6em] uppercase">Elite Infrastructure</p>
            </div>
        </header>

        <div class="flex flex-col items-center">
            <div class="w-32 h-[1px] bg-gradient-to-r from-transparent via-cyan-500/40 to-transparent mb-10"></div>
            <h2 class="text-5xl font-black tracking-tighter text-white/90 leading-[0.9]">PURE.<br>FREE.<br><span class="text-cyan-500">PRO.</span></h2>
            <div class="w-32 h-[1px] bg-gradient-to-r from-transparent via-cyan-500/40 to-transparent mt-10"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 pb-14">
            <button class="btn-minimal">Find Job</button>
            <button class="btn-minimal text-cyan-400 border-cyan-500/20">Post Job</button>
            <button class="btn-minimal opacity-30 !h-14">About</button>
            <button class="btn-minimal opacity-30 !h-14">Contact</button>
        </div>

    </div>

</body>
</html>
