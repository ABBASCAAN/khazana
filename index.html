<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Khazana | Pakistan's Pride</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;600&family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Plus Jakarta Sans', 'IBM Plex Sans Arabic', sans-serif;
            background: #001a0f; /* Deep National Green Base */
        }
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            background: radial-gradient(circle at 100% 0%, #004225 0%, #001a0f 70%);
            position: relative;
        }
        /* Pakistani Crescent Visual - Abstract */
        .crescent-bg {
            position: absolute; top: -50px; left: -50px;
            width: 300px; height: 300px;
            border: 40px solid rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            z-index: 0;
        }
        .urdu-pro { font-family: 'IBM Plex Sans Arabic', sans-serif; line-height: 1.3; }
        
        .action-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .action-card:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.97);
        }
        .free-badge {
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>

    <div class="crescent-bg"></div>

    <div class="app-container justify-between py-8">
        
        <header class="relative z-10 flex flex-col items-center gap-2">
            <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-2xl">
                <div class="w-6 h-6 bg-[#004225] rounded-md"></div>
            </div>
            <div class="text-center mt-2">
                <h1 class="text-white text-xl font-black tracking-[0.2em] uppercase">Khazana</h1>
                <div class="free-badge text-[9px] font-black text-white px-4 py-1 rounded-full uppercase tracking-widest mt-1">
                    Free Forever • ہمیشہ مفت
                </div>
            </div>
        </header>

        <div class="relative z-10 text-center px-4">
            <h2 class="urdu-pro text-4xl font-semibold text-white leading-tight mb-4">
                روشن مستقبل، <br> <span class="text-emerald-400">آپ کے ہاتھ میں</span>
            </h2>
            <p class="urdu-pro text-white/40 text-sm font-light">
                پاکستانیوں کے لیے ایک بے مثال پلیٹ فارم <br> جو لاتا ہے روزگار کے بہترین مواقع۔
            </p>
        </div>

        <div class="relative z-10 space-y-4 mb-8">
            <div class="action-card p-6 flex items-center justify-between group">
                <div class="flex items-center gap-5">
                    <div class="w-16 h-16 bg-emerald-500/20 rounded-2xl flex items-center justify-center text-3xl">
                        🔍
                    </div>
                    <div class="text-right">
                        <h3 class="urdu-pro text-xl font-semibold text-white">نوکری تلاش کریں</h3>
                        <p class="urdu-pro text-[11px] text-white/30 font-bold tracking-widest uppercase">Acquire Opportunity</p>
                    </div>
                </div>
                <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
                    <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
                </div>
            </div>

            <div class="action-card p-6 flex items-center justify-between">
                <div class="flex items-center gap-5">
                    <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center text-3xl">
                        💼
                    </div>
                    <div class="text-right">
                        <h3 class="urdu-pro text-xl font-semibold text-white">اشتہار لگائیں</h3>
                        <p class="urdu-pro text-[11px] text-white/30 font-bold tracking-widest uppercase">Post Vacancy</p>
                    </div>
                </div>
                <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
                    <svg class="w-5 h-5 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
                </div>
            </div>
        </div>

        <footer class="relative z-10 text-center">
            <p class="text-[9px] font-black text-white/20 uppercase tracking-[0.5em]">
                National Workforce Infrastructure • 2026
            </p>
        </div>

    </div>

</body>
</html>
