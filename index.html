<script>
    // Supabase Connection (Vercel automatically handles the variables)
    // Testing ke liye aap yahan direct keys bhi dal sakte hain agar Vercel variable na uthaye
    const supabaseUrl = 'Aap_Ka_Supabase_URL'; 
    const supabaseKey = 'Aap_Ki_Anon_Key';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    function toggleModal() {
        const modal = document.getElementById('auth-modal');
        modal.classList.toggle('hidden');
    }

    // Nav bar button ko active karna
    document.querySelector('button').onclick = toggleModal;

    async function handleSignUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('signup-btn');

        if (!email || !password) return alert("Email aur Password dono dalien!");

        btn.innerText = "Checking...";
        btn.disabled = true;

        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
        });

        if (error) {
            alert("Error: " + error.message);
            btn.innerText = "CREATE ACCOUNT";
            btn.disabled = false;
        } else {
            alert("Mubarak ho! Aap ka account ban gaya hai.");
            toggleModal();
        }
    }
</script>
