<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khazana Jobs App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --app-green: #004225; --app-bg: #F8FAFC; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--app-bg);
            -webkit-tap-highlight-color: transparent;
        }
        /* Mobile App Feel */
        .app-card { border-radius: 24px; background: white; box-shadow: 0 10px 25px -5px rgba(0, 66, 37, 0.05); }
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.05);
            padding: 12px 24px 24px 24px;
            z-index: 1000;
        }
        .action-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:active { transform: scale(0.95); }
        
        /* Premium Visual Gradient */
        .premium-bg {
            background: linear-gradient(135deg, #004225 0%, #012e1a 100%);
            border-radius: 0 0 40px 40px;
        }
    </style>
</head>
<body class="pb-32">

    <div class="premium-bg pt-16 pb-24 px-6 relative overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] w-40 h-40 bg-emerald-500/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[10%] left-[-5%] w-32 h-32 bg-emerald-400/10 rounded-full blur-2xl"></div>

        <div class="relative z-10 flex justify-between items-center mb-10">
            <div>
                <h1 class="text-white text-3xl font-extrabold tracking-tighter">KHAZANA</h1>
                <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-[0.3em]">National Job Network</p>
            </div>
            <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center border border-white/20">
                <span class="text-white text-lg">🔔</span>
            </div>
        </div>

        <div class="relative z-10">
            <h2 class="text-white text-2xl font-bold leading-tight mb-2 italic">Assalam-o-Alaikum, <br>Pakistan!</h2>
            <p class="text-emerald-100/70 text-xs font-medium uppercase tracking-widest">Find your destiny today.</p>
        </div>
    </div>

    <div class="px-6 -mt-12 relative z-20">
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button class="action-btn app-card p-6 flex flex-col items-center justify-center border-2 border-transparent hover:border-emerald-500 active:bg-emerald-50">
                <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center text-3xl mb-4">🔍</div>
                <span class="font-bold text-slate-800 text-sm">Find a Job</span>
            </button>
            <button class="action-btn app-card p-6 flex flex-col items-center justify-center border-2 border-transparent hover:border-emerald-500 active:bg-emerald-50">
                <div class="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl mb-4 text-white">➕</div>
                <span class="font-bold text-slate-800 text-sm">Post a Job</span>
            </button>
        </div>

        <div class="app-card p-6 mb-8 border border-emerald-100">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-2 h-8 bg-emerald-500 rounded-full"></div>
                <h3 class="font-extrabold text-slate-900 tracking-tight">Identity Terminal</h3>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="cnicInput" maxlength="13" placeholder="Enter CNIC Number" 
                    class="w-full bg-slate-50 border-none p-5 rounded-2xl text-slate-900 font-bold text-lg focus:ring-2 focus:ring-emerald-500 transition-all placeholder:text-slate-300">
                
                <div id="statusResult" class="hidden p-5 rounded-2xl bg-emerald-50 border border-emerald-100 animate-pulse">
                    <p id="genderInfo" class="text-emerald-700 font-extrabold text-xs uppercase tracking-widest text-center italic"></p>
                </div>
            </div>
        </div>

        <div class="app-card p-8 bg-slate-900 text-white overflow-hidden relative">
            <div class="absolute top-0 right-0 w-24 h-24 bg-emerald-600/20 rounded-full translate-x-12 -translate-y-12"></div>
            <h4 class="font-bold text-emerald-400 text-[10px] uppercase tracking-[0.4em] mb-4 italic">Our Promise</h4>
            <p class="text-lg font-bold leading-tight mb-6">100% Free. <br>Verified People. <br>Strong Pakistan.</p>
            <div class="h-1 w-12 bg-emerald-500"></div>
        </div>

    </div>

    <div class="bottom-nav flex justify-around items-center shadow-2xl">
        <div class="flex flex-col items-center gap-1">
            <span class="text-2xl text-emerald-700">🏠</span>
            <span class="text-[10px] font-black text-emerald-700 uppercase tracking-tighter">Home</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-30">
            <span class="text-2xl">💼</span>
            <span class="text-[10px] font-black text-slate-900 uppercase tracking-tighter">Jobs</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-30">
            <span class="text-2xl">👤</span>
            <span class="text-[10px] font-black text-slate-900 uppercase tracking-tighter">Profile</span>
        </div>
    </div>

    <script>
        const cnicInput = document.getElementById('cnicInput');
        const statusResult = document.getElementById('statusResult');
        const genderInfo = document.getElementById('genderInfo');

        cnicInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.length === 13) {
                const lastDigit = parseInt(val.charAt(12));
                statusResult.classList.remove('hidden');
                
                if (lastDigit % 2 === 0) {
                    genderInfo.innerText = "Verified Account: Female Applicant";
                } else {
                    genderInfo.innerText = "Verified Account: Male Applicant";
                }
            } else {
                statusResult.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
