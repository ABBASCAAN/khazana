<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Khazana Jobs | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;800&family=Noto+Sans+Arabic:wght@100;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10b981; }
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000000;
        }
        .app-canvas {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top) 30px env(safe-area-inset-bottom) 30px;
            background: radial-gradient(circle at 50% 0%, #061a11 0%, #000000 100%);
            position: relative;
        }
        /* Ultra-Modern Urdu - Very Thin & Sharp */
        .urdu-slim { font-family: 'Noto Sans Arabic', sans-serif; font-weight: 100; letter-spacing: -0.02em; }
        .urdu-bold { font-family: 'Noto Sans Arabic', sans-serif; font-weight: 700; }

        /* The 4 Buttons - Total Clean Look */
        .grid-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 110px;
            transition: all 0.4s cubic-bezier(0.15, 1, 0.3, 1);
        }
        .grid-btn:active {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--accent);
            transform: scale(0.95);
        }
        .btn-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: white;
            margin-bottom: 4px;
        }

        /* Ambient Glow */
        .aura {
            position: absolute; width: 150px; height: 150px;
            background: var(--accent); filter: blur(100px);
            opacity: 0.15; z-index: 0;
        }
    </style>
</head>
<body>

    <div class="aura" style="top: 20%; left: 10%;"></div>

    <div class="app-canvas py-12">
        
        <header class="z-10 flex flex-col items-center">
            <h1 class="text-2xl font-[800] italic tracking-tighter text-white">
                KHAZANA <span class="text-emerald-500">JOBS</span>
            </h1>
            <div class="h-[1px] w-12 bg-emerald-500/30 mt-2"></div>
        </header>

        <section class="z-10 text-right space-y-6">
            <h2 class="urdu-bold text-5xl text-white leading-tight">
                رزقِ حلال، <br> <span class="text-emerald-500">آپ کی دہلیز پر۔</span>
            </h2>
            <div class="space-y-4">
                <p class="urdu-slim text-lg text-white/50 leading-relaxed">
                    یہ کوئی عام ادارہ نہیں، بلکہ آپ کی خودداری کا محافظ ہے۔ ہمارا مقصد صرف نوکری نہیں، آپ کی زندگی میں معاشی سکون لانا ہے۔
                </p>
                <div class="inline-flex items-center gap-3 bg-white/5 px-4 py-2 rounded-full border border-white/10">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="urdu-slim text-[10px] text-emerald-400 uppercase tracking-widest">مفت۔ شفاف۔ ہمیشہ کے لیے۔</span>
                </div>
            </div>
        </section>

        <div class="z-10 grid grid-cols-2 gap-4 mb-4">
            
            <button class="grid-btn">
                <span class="btn-label">Find Job</span>
                <div class="w-1 h-1 bg-emerald-500 rounded-full mt-2"></div>
            </button>

            <button class="grid-btn">
                <span class="btn-label text-emerald-500">Post Job</span>
                <div class="w-1 h-1 bg-white/20 rounded-full mt-2"></div>
            </button>

            <button class="grid-btn">
                <span class="btn-label text-white/40">About Us</span>
            </button>

            <button class="grid-btn">
                <span class="btn-label text-white/40">Contact</span>
            </button>

        </div>

        <footer class="z-10 text-center opacity-10">
            <span class="text-[8px] font-bold tracking-[0.6em] uppercase text-white">Ultimate Workforce Ecosystem</span>
        </footer>

    </div>

</body>
</html>
