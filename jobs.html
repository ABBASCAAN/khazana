<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Available Jobs | Khazana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://font.paksign.com/fonts/Jameel-Noori-Nastaleeq.ttf') format('truetype');
        }
        :root { --soft-white: #F8FAFC; --deep-green: #064E3B; --emerald-glow: #10B981; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(180deg, #FFFFFF 0%, #F1F5F9 100%);
            color: var(--deep-green);
            min-height: 100vh;
        }

        body::before {
            content: 'KPK'; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 15rem; font-weight: 900; color: rgba(6, 78, 59, 0.03); z-index: -1;
        }

        .nastaleeq { font-family: 'Jameel Noori Nastaleeq', serif; }

        .city-select {
            background: white; border: 1px solid rgba(6, 78, 59, 0.1);
            border-radius: 20px; padding: 16px; width: 100%; 
            color: var(--deep-green); font-size: 14px; font-weight: 800; outline: none;
            transition: 0.3s; appearance: none; box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .job-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 32px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
        }
        .job-card:hover { transform: translateY(-5px); background: white; shadow: 0 20px 40px rgba(0,0,0,0.05); }

        .view-btn {
            background: var(--deep-green); border-radius: 18px; padding: 14px 22px; 
            color: white; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.15em; font-size: 9px;
            box-shadow: 0 8px 20px rgba(6, 78, 59, 0.15);
            transition: 0.3s;
        }
        .view-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <header class="text-center mt-6 mb-12">
            <h1 class="text-xl font-black italic tracking-tighter text-emerald-900">KHAZANA <span class="text-emerald-500">OPPORTUNITIES</span></h1>
            <p class="nastaleeq text-lg text-emerald-600 mt-1">بہترین روزگار کے مواقع</p>
        </header>

        <div class="mb-10 relative">
            <label class="block text-[9px] font-black text-emerald-900/30 uppercase tracking-[0.4em] mb-4 ml-2">Select Deployment Area</label>
            <select id="cityFilter" onchange="displayJobs()" class="city-select">
                <option value="none" selected>--- Select the City ---</option>
                <option value="all">All Cities (تمام شہر)</option>
                <option value="swabi">Swabi (صوابی)</option>
                <option value="mardan">Mardan (مردان)</option>
                <option value="peshawar">Peshawar (پشاور)</option>
                <option value="nowshera">Nowshera (نوشہرہ)</option>
                <option value="charsadda">Charsadda (چارسدہ)</option>
                <option value="swat">Swat (سوات)</option>
                <option value="mingora">Mingora (مینگورہ)</option>
            </select>
            <div class="absolute right-6 top-[50px] pointer-events-none opacity-20 text-[10px]">▼</div>
        </div>

        <div id="jobsContainer" class="space-y-5">
            <div id="selectionPrompt" class="text-center py-20 opacity-40">
                <p class="nastaleeq text-xl">براہ کرم نوکریاں دیکھنے کے لیے شہر منتخب کریں</p>
                <p class="text-[9px] font-black uppercase tracking-[0.3em] mt-2">Awaiting Location Selection...</p>
            </div>

            <div id="loading" class="hidden text-center py-24">
                <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-emerald-900 mx-auto mb-6"></div>
                <p class="text-[9px] font-black text-emerald-900/20 uppercase tracking-[0.5em]">Syncing Khazana Cloud</p>
            </div>
        </div>

        <div id="noJobs" class="hidden text-center py-20">
            <p class="nastaleeq text-emerald-900/40 text-xl leading-relaxed">اس وقت اس شہر میں کوئی نئی نوکری دستیاب نہیں ہے۔<br><span class="text-sm font-sans font-bold opacity-50">CHECK BACK LATER</span></p>
        </div>

        <div class="text-center mt-16 pb-12">
            <a href="index.html" class="text-[10px] font-black text-emerald-900/20 uppercase tracking-[0.5em] hover:text-emerald-500 transition-all">← Exit to Portal</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3_OdMLA_vKedi78_1isqKTAYGeYYhGfs",
            authDomain: "khazana-830dc.firebaseapp.com",
            projectId: "khazana-830dc",
            storageBucket: "khazana-830dc.firebasestorage.app",
            messagingSenderId: "475195159792",
            appId: "1:475195159792:web:f676958613562e5d10fe35",
            measurementId: "G-HC5WMRT7NW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allJobs = [];

        async function fetchJobs() {
            try {
                const q = query(collection(db, "jobs"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                allJobs = [];
                querySnapshot.forEach((doc) => {
                    allJobs.push({ id: doc.id, ...doc.data() });
                });
                // Note: displayJobs() hum onchange par hi call karein gay ab.
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = "SYSTEM ERROR";
            }
        }

        window.displayJobs = function() {
            const container = document.getElementById('jobsContainer');
            const selectedCity = document.getElementById('cityFilter').value;
            const noJobsEl = document.getElementById('noJobs');
            const promptEl = document.getElementById('selectionPrompt');
            const loadingEl = document.getElementById('loading');
            
            // UI Reset
            container.innerHTML = "";
            noJobsEl.classList.add('hidden');

            // Agar koi city select nahi ki
            if (selectedCity === "none") {
                if (promptEl) promptEl.classList.remove('hidden');
                container.appendChild(promptEl);
                return;
            }

            // Agar city select kar li hai
            if (promptEl) promptEl.classList.add('hidden');
            
            const filtered = allJobs.filter(job => 
                selectedCity === 'all' || job.city.toLowerCase() === selectedCity.toLowerCase()
            );

            if (filtered.length === 0) {
                noJobsEl.classList.remove('hidden');
            } else {
                filtered.forEach(job => {
                    container.innerHTML += `
                        <div class="job-card p-6 shadow-sm flex justify-between items-center mb-4">
                            <div class="flex-1 pr-4">
                                <div class="flex items-center space-x-2">
                                    <span class="bg-emerald-50 text-emerald-600 text-[7px] font-black px-2.5 py-1 rounded-lg uppercase tracking-widest border border-emerald-100/50">${job.city}</span>
                                </div>
                                <h3 class="text-[17px] font-black text-emerald-900 mt-3 tracking-tight leading-tight">${job.title}</h3>
                                <div class="flex items-center mt-2 opacity-30">
                                    <span class="text-[8px] font-bold uppercase tracking-tighter">${job.dateStr || 'Active Now'}</span>
                                </div>
                            </div>
                            <div class="flex-shrink-0">
                                <a href="job-details.html?id=${job.id}" class="view-btn">
                                    Details
                                </a>
                            </div>
                        </div>
                    `;
                });
            }
        };

        fetchJobs();
    </script>
</body>
</html>
