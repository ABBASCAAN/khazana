<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Jobs | Khazana Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://font.paksign.com/fonts/Jameel-Noori-Nastaleeq.ttf') format('truetype');
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; color: #064E3B; }
        .nastaleeq { font-family: 'Jameel Noori Nastaleeq', serif; }
        .job-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .job-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="p-5">

    <div class="text-center mb-8">
        <h1 class="text-2xl font-black text-emerald-900 tracking-tighter uppercase">Available Opportunities</h1>
        <p class="nastaleeq text-lg text-emerald-600 mt-2">اپنے شہر کے مطابق نوکریاں تلاش کریں</p>
    </div>

    <div class="max-w-md mx-auto mb-10">
        <label class="block text-[10px] font-bold text-emerald-900/50 uppercase tracking-widest mb-2 px-2">Select Your City</label>
        <select id="cityFilter" onchange="displayJobs()" class="w-full p-4 bg-white border border-emerald-100 rounded-2xl shadow-sm outline-none text-emerald-900 font-bold focus:ring-2 focus:ring-emerald-500 transition-all cursor-pointer">
            <option value="all">Tamam Shehar (All Cities)</option>
            <option value="swabi">Swabi (صوابی)</option>
            <option value="mardan">Mardan (مردان)</option>
            <option value="peshawar">Peshawar (پشاور)</option>
            <option value="nowshera">Nowshera (نوشہرہ)</option>
        </select>
    </div>

    <div id="jobsContainer" class="space-y-4 max-w-2xl mx-auto">
        <div id="loading" class="text-center py-10">
            <p class="text-xs font-bold text-emerald-900/30 animate-pulse tracking-widest">CONNECTING TO KHAZANA CLOUD...</p>
        </div>
    </div>

    <div id="noJobs" class="hidden text-center py-10">
        <p class="nastaleeq text-emerald-900/40 text-xl">اس شہر میں ابھی کوئی نوکری دستیاب نہیں ہے۔</p>
    </div>

    <div class="text-center mt-10">
        <a href="index.html" class="text-[10px] font-black text-emerald-900/30 uppercase tracking-[0.3em] hover:text-emerald-500 transition-colors">← Back to Portal</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3_OdMLA_vKedi78_1isqKTAYGeYYhGfs",
            authDomain: "khazana-830dc.firebaseapp.com",
            projectId: "khazana-830dc",
            storageBucket: "khazana-830dc.firebasestorage.app",
            messagingSenderId: "475195159792",
            appId: "1:475195159792:web:f676958613562e5d10fe35",
            measurementId: "G-HC5WMRT7NW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allJobs = [];

        async function fetchJobs() {
            try {
                const q = query(collection(db, "jobs"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                allJobs = [];
                querySnapshot.forEach((doc) => {
                    allJobs.push({ id: doc.id, ...doc.data() });
                });
                displayJobs();
            } catch (error) {
                console.error("Error fetching jobs: ", error);
                document.getElementById('loading').innerHTML = "Connection Error. Please Refresh.";
            }
        }

        window.displayJobs = function() {
            const container = document.getElementById('jobsContainer');
            const selectedCity = document.getElementById('cityFilter').value;
            const noJobsEl = document.getElementById('noJobs');
            const loadingEl = document.getElementById('loading');
            
            if (loadingEl) loadingEl.style.display = 'none';
            container.innerHTML = "";
            
            const filtered = allJobs.filter(job => 
                selectedCity === 'all' || job.city.toLowerCase() === selectedCity.toLowerCase()
            );

            if (filtered.length === 0) {
                noJobsEl.classList.remove('hidden');
            } else {
                noJobsEl.classList.add('hidden');
                filtered.forEach(job => {
                    container.innerHTML += `
                        <div class="job-card bg-white p-5 rounded-[30px] shadow-sm border border-emerald-50/50 flex justify-between items-center">
                            <div>
                                <span class="bg-emerald-50 text-emerald-600 text-[8px] font-black px-3 py-1 rounded-full uppercase tracking-tighter">${job.city}</span>
                                <h3 class="text-lg font-extrabold text-emerald-900 mt-1">${job.title}</h3>
                            </div>
                            <a href="job-details.html?id=${job.id}" class="bg-emerald-900 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all shadow-md">
                                View Details
                            </a>
                        </div>
                    `;
                });
            }
        };

        fetchJobs();
    </script>
</body>
</html>
