<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Job Details | Khazana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://font.paksign.com/fonts/Jameel-Noori-Nastaleeq.ttf') format('truetype');
        }
        :root { --deep-green: #064E3B; --whatsapp: #25D366; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(180deg, #FFFFFF 0%, #F1F5F9 100%);
            color: var(--deep-green);
            min-height: 100vh;
        }

        /* KPK Watermark */
        body::before {
            content: 'KPK'; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 15rem; font-weight: 900; color: rgba(6, 78, 59, 0.03); z-index: -1;
        }

        .nastaleeq { font-family: 'Jameel Noori Nastaleeq', serif; line-height: 1.8; text-align: left; }

        .details-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid white;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        .fast-apply-btn {
            background: var(--deep-green);
            color: white;
            padding: 18px;
            border-radius: 22px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 10px;
            text-align: center;
            display: block;
            box-shadow: 0 10px 20px rgba(6, 78, 59, 0.2);
            transition: 0.3s;
        }
        .fast-apply-btn:active { transform: scale(0.95); opacity: 0.9; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <header class="text-center mt-4 mb-8">
            <h1 class="text-xl font-black italic tracking-tighter text-emerald-900 uppercase">KHAZANA <span class="text-emerald-500">JOBS</span></h1>
            <p class="text-[7px] font-bold text-emerald-900/30 tracking-[0.5em] mt-1 uppercase">Official Recruitment Page</p>
        </header>

        <div id="detailsCard" class="details-card p-8 min-h-[500px] flex flex-col">
            
            <div id="loader" class="text-center py-20 my-auto">
                <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-emerald-900 mx-auto mb-4"></div>
                <p class="text-[9px] font-black text-emerald-900/20 uppercase tracking-[0.4em]">Loading Profile...</p>
            </div>

            <div id="jobData" class="hidden flex-1 flex flex-col">
                
                <a id="waLinkTop" href="#" class="fast-apply-btn mb-8">Fast APPLY</a>

                <div class="mb-6">
                    <span id="jobCity" class="bg-emerald-50 text-emerald-600 text-[8px] font-black px-3 py-1 rounded-lg uppercase tracking-widest border border-emerald-100"></span>
                    <h2 id="jobTitle" class="text-2xl font-black text-emerald-900 mt-4 tracking-tight leading-tight"></h2>
                    <div class="h-1 w-10 bg-emerald-500/20 mt-4 rounded-full"></div>
                </div>

                <div class="bg-white/40 rounded-3xl p-6 mb-8 border border-white/50">
                    <p id="jobDesc" class="nastaleeq text-[19px] text-emerald-800"></p>
                </div>

                <div class="mt-auto space-y-6">
                    <a id="waLinkBottom" href="#" class="fast-apply-btn">Fast APPLY</a>
                    
                    <button onclick="window.location.href='jobs.html'" class="w-full text-[9px] font-black text-emerald-900/30 uppercase tracking-[0.4em] py-2 transition-all hover:text-emerald-500">
                        ← Back to Opportunities
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3_OdMLA_vKedi78_1isqKTAYGeYYhGfs",
            authDomain: "khazana-830dc.firebaseapp.com",
            projectId: "khazana-830dc",
            storageBucket: "khazana-830dc.firebasestorage.app",
            messagingSenderId: "475195159792",
            appId: "1:475195159792:web:f676958613562e5d10fe35",
            measurementId: "G-HC5WMRT7NW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function getJobDetails() {
            const params = new URLSearchParams(window.location.search);
            const jobId = params.get('id');

            if (!jobId) {
                alert("Critical Error: Job ID Missing.");
                return;
            }

            try {
                const docRef = doc(db, "jobs", jobId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const job = docSnap.data();
                    
                    document.getElementById('jobTitle').innerText = job.title;
                    document.getElementById('jobCity').innerText = job.city;
                    document.getElementById('jobDesc').innerText = job.desc;
                    
                    const waPhone = job.phone || "923000000000";
                    const waText = window.encodeURIComponent(`Assalamoalaikum! I saw the '${job.title}' posting on Khazana Jobs and I want to apply.`);
                    
                    // Linking both Fast Apply buttons
                    const fullLink = `https://wa.me/${waPhone}?text=${waText}`;
                    document.getElementById('waLinkTop').href = fullLink;
                    document.getElementById('waLinkBottom').href = fullLink;

                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('jobData').classList.remove('hidden');
                } else {
                    document.getElementById('loader').innerHTML = "Post Expired or Removed.";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loader').innerHTML = "Cloud Sync Error.";
            }
        }

        getJobDetails();
    </script>
</body>
</html>
