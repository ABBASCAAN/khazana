<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Job Details | Khazana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://font.paksign.com/fonts/Jameel-Noori-Nastaleeq.ttf') format('truetype');
        }
        :root { --deep-green: #064E3B; --whatsapp: #25D366; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(180deg, #FFFFFF 0%, #F1F5F9 100%);
            color: var(--deep-green);
            min-height: 100vh;
        }

        /* KPK Watermark */
        body::before {
            content: 'KPK'; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 15rem; font-weight: 900; color: rgba(6, 78, 59, 0.03); z-index: -1;
        }

        /* Description Styling: Compact & Professional */
        .desc-box {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 18px;
            max-height: 250px; /* Lamba hone se rokega */
            overflow-y: auto; /* Agar lamba ho to scroll ho jaye */
            border: 1px solid rgba(255,255,255,0.8);
        }

        .nastaleeq { 
            font-family: 'Jameel Noori Nastaleeq', serif; 
            line-height: 1.6; 
            text-align: left;
            font-size: 17px; /* Thoda chota font taake compact lagay */
        }

        .details-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid white;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        .fast-apply-btn {
            background: var(--deep-green);
            color: white;
            padding: 16px;
            border-radius: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 9px;
            text-align: center;
            display: block;
            box-shadow: 0 8px 15px rgba(6, 78, 59, 0.15);
            transition: 0.3s;
        }
        .fast-apply-btn:active { transform: scale(0.95); opacity: 0.9; }

        /* Custom Scrollbar for Pro look */
        .desc-box::-webkit-scrollbar { width: 4px; }
        .desc-box::-webkit-scrollbar-thumb { background: rgba(6, 78, 59, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <header class="text-center mt-4 mb-8">
            <h1 class="text-xl font-black italic tracking-tighter text-emerald-900 uppercase">KHAZANA <span class="text-emerald-500">JOBS</span></h1>
            <p class="text-[7px] font-bold text-emerald-900/30 tracking-[0.5em] mt-1 uppercase">Official Recruitment Page</p>
        </header>

        <div id="detailsCard" class="details-card p-7 min-h-[450px] flex flex-col">
            
            <div id="loader" class="text-center py-20 my-auto">
                <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-emerald-900 mx-auto mb-4"></div>
                <p class="text-[9px] font-black text-emerald-900/20 uppercase tracking-[0.4em]">Loading Profile...</p>
            </div>

            <div id="jobData" class="hidden flex-1 flex flex-col">
                
                <a id="waLinkTop" href="#" class="fast-apply-btn mb-6">Fast APPLY</a>

                <div class="mb-5">
                    <span id="jobCity" class="bg-emerald-50 text-emerald-600 text-[7px] font-black px-3 py-1 rounded-lg uppercase tracking-widest border border-emerald-100"></span>
                    <h2 id="jobTitle" class="text-xl font-black text-emerald-900 mt-3 tracking-tight leading-tight"></h2>
                    <div class="h-1 w-8 bg-emerald-500/20 mt-3 rounded-full"></div>
                </div>

                <div class="desc-box mb-6 shadow-inner">
                    <p id="jobDesc" class="nastaleeq text-emerald-800"></p>
                </div>

                <div class="mt-auto space-y-4">
                    <a id="waLinkBottom" href="#" class="fast-apply-btn">Fast APPLY</a>
                    
                    <button onclick="window.location.href='jobs.html'" class="w-full text-[8px] font-black text-emerald-900/20 uppercase tracking-[0.4em] py-2">
                        ← Back to Opportunities
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3_OdMLA_vKedi78_1isqKTAYGeYYhGfs",
            authDomain: "khazana-830dc.firebaseapp.com",
            projectId: "khazana-830dc",
            storageBucket: "khazana-830dc.firebasestorage.app",
            messagingSenderId: "475195159792",
            appId: "1:475195159792:web:f676958613562e5d10fe35",
            measurementId: "G-HC5WMRT7NW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function getJobDetails() {
            const params = new URLSearchParams(window.location.search);
            const jobId = params.get('id');

            if (!jobId) return;

            try {
                const docRef = doc(db, "jobs", jobId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const job = docSnap.data();
                    
                    document.getElementById('jobTitle').innerText = job.title;
                    document.getElementById('jobCity').innerText = job.city;
                    document.getElementById('jobDesc').innerText = job.desc;
                    
                    const waPhone = job.phone || "923000000000";
                    const waText = window.encodeURIComponent(`Assalamoalaikum! I saw the '${job.title}' posting on Khazana Jobs and I want to apply.`);
                    
                    const fullLink = `https://wa.me/${waPhone}?text=${waText}`;
                    document.getElementById('waLinkTop').href = fullLink;
                    document.getElementById('waLinkBottom').href = fullLink;

                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('jobData').classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
            }
        }
        getJobDetails();
    </script>
</body>
</html>
