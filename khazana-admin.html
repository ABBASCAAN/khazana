<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Control Panel | Khazana Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --soft-white: #F8FAFC; --deep-green: #064E3B; --mint-glow: #ECFDF5; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(180deg, #FFFFFF 0%, #F1F5F9 100%);
            color: var(--deep-green);
            min-height: 100vh;
        }

        /* KPK Watermark Background */
        body::before {
            content: 'KPK'; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 12rem; font-weight: 900; color: rgba(6, 78, 59, 0.03); z-index: -1;
        }

        .input-field {
            background: white; border: 1px solid rgba(6, 78, 59, 0.08);
            border-radius: 20px; padding: 18px; width: 100%; 
            color: var(--deep-green); font-size: 13px; outline: none;
            transition: 0.3s; text-align: left; /* Left alignment for Pro feel */
        }
        .input-field:focus { border-color: var(--deep-green); box-shadow: 0 0 0 4px rgba(6, 78, 59, 0.05); }

        .primary-btn {
            background: var(--deep-green); border-radius: 22px; padding: 20px; 
            color: white; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 0.2em; font-size: 10px; width: 100%;
            box-shadow: 0 10px 25px rgba(6, 78, 59, 0.2); 
            transition: 0.3s; cursor: pointer; border: none;
        }
        .primary-btn:active { transform: scale(0.96); opacity: 0.9; }

        .job-item {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid white;
            border-radius: 24px;
            transition: 0.3s;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3_OdMLA_vKedi78_1isqKTAYGeYYhGfs",
            authDomain: "khazana-830dc.firebaseapp.com",
            projectId: "khazana-830dc",
            storageBucket: "khazana-830dc.firebasestorage.app",
            messagingSenderId: "475195159792",
            appId: "1:475195159792:web:f676958613562e5d10fe35",
            measurementId: "G-HC5WMRT7NW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.postJob = async () => {
            const title = document.getElementById('title').value;
            const city = document.getElementById('city').value;
            const phone = document.getElementById('phone').value;
            const desc = document.getElementById('desc').value;

            if(!title || !desc || !phone) return alert("Please fill all fields!");
            if(phone.length < 10) return alert("Invalid WhatsApp number!");

            try {
                await addDoc(collection(db, "jobs"), {
                    title, city, phone, desc, 
                    createdAt: serverTimestamp(),
                    dateStr: new Date().toLocaleDateString()
                });
                alert("Success! Job is now live.");
                resetForm();
                loadJobs();
            } catch (e) { alert("Error: " + e.message); }
        };

        window.loadJobs = async () => {
            const q = query(collection(db, "jobs"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            const list = document.getElementById('jobList');
            list.innerHTML = "";
            querySnapshot.forEach((docSnap) => {
                const job = docSnap.data();
                list.innerHTML += `
                    <div class="job-item p-5 mb-4 shadow-sm flex justify-between items-center text-left">
                        <div>
                            <p class="font-black text-emerald-900 tracking-tight">${job.title}</p>
                            <p class="text-[9px] text-emerald-600/50 uppercase font-bold tracking-widest mt-1">${job.city} • ${job.phone}</p>
                        </div>
                        <button onclick="deleteJob('${docSnap.id}')" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-[9px] font-black tracking-widest hover:bg-red-100 transition-all">REMOVE</button>
                    </div>`;
            });
        };

        window.deleteJob = async (id) => {
            if(confirm("Permanently delete this posting?")) {
                await deleteDoc(doc(db, "jobs", id));
                loadJobs();
            }
        };

        function resetForm() {
            document.getElementById('title').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('desc').value = '';
        }

        window.onload = loadJobs;
    </script>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto pt-8">
        <header class="text-center mb-10">
            <h1 class="text-xl font-black italic tracking-tighter text-emerald-900">KHAZANA <span class="text-emerald-500">ADMIN</span></h1>
            <p class="text-[7px] font-bold text-emerald-900/30 tracking-[0.6em] mt-1 uppercase">Unit Control Center</p>
        </header>
        
        <div class="space-y-4 mb-12">
            <input type="text" id="title" placeholder="JOB TITLE" class="input-field">
            
            <select id="city" class="input-field font-bold uppercase tracking-widest text-[11px]">
                <option value="swabi">Swabi</option>
                <option value="mardan">Mardan</option>
                <option value="peshawar">Peshawar</option>
                <option value="nowshera">Nowshera</option>
                <option value="swabi">Charsadda</option>
                <option value="swabi">Swat</option>
                <option value="swabi">Mingora</option>
            </select>

            <input type="number" id="phone" placeholder="WHATSAPP (e.g. 923...)" class="input-field">
            
            <textarea id="desc" placeholder="DESCRIBE THE ROLE & SKILLS..." rows="5" class="input-field"></textarea>
            
            <button onclick="postJob()" class="primary-btn mt-4">Post now</button>
        </div>

        <div class="pt-4">
            <h2 class="text-[9px] font-black text-emerald-900/20 uppercase tracking-[0.4em] mb-6 text-center">Active Deployments</h2>
            <div id="jobList"></div>
        </div>
    </div>
</body>
</html>
