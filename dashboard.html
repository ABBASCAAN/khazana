<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khazana Pro | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050a15; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="hidden p-4 md:p-8" id="dashboard-body"> <nav class="flex justify-between items-center mb-12">
        <h1 class="text-2xl font-bold italic text-blue-400">KHAZANA.<span class="text-white text-sm">PRO</span></h1>
        <button onclick="handleLogout()" class="glass px-6 py-2 rounded-full text-xs font-bold hover:bg-red-500 transition">Sign Out</button>
    </nav>

    <header class="mb-10">
        <h2 class="text-3xl font-bold mb-2">Khush Amdeed, <span id="user-email" class="text-blue-400 text-lg font-light"></span></h2>
        <p class="text-gray-400">Aapka account secure hai aur aapka safar shuru ho chuka hai.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="glass p-8 rounded-[2rem]">
            <p class="text-gray-500 text-xs uppercase tracking-widest mb-2 font-bold">Earning</p>
            <h3 class="text-4xl font-black">$0.00</h3>
        </div>
        </div>

    <script>
        const sUrl = 'https://joeraoythobkbljnxfmf.supabase.co';
        const sKey = 'YOUR_ANON_KEY'; // Yahan apni key lazmi dalein
        const _supabase = supabase.createClient(sUrl, sKey);

        // --- SECURITY GUARD ---
        async function checkUser() {
            const { data: { session } } = await _supabase.auth.getSession();
            
            if (!session) {
                // Agar user login nahi hai to wapas bhej do
                alert("Pehle login karein!");
                window.location.href = 'index.html';
            } else {
                // Agar login hai to body show karo aur email likho
                document.getElementById('dashboard-body').classList.remove('hidden');
                document.getElementById('user-email').innerText = session.user.email;
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        checkUser();
    </script>
</body>
</html>
